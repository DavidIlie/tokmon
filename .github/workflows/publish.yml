name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm --prefix web install --frozen-lockfile
      # Builds dist/cli.js (tsup) AND dist/web (vite) — both ship via files:["dist"].
      - run: pnpm run build

      - run: npm publish --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-gpr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@DavidIlie'

      - run: pnpm install --frozen-lockfile
      - run: pnpm --prefix web install --frozen-lockfile
      # Builds dist/cli.js (tsup) AND dist/web (vite) — both ship via files:["dist"].
      - run: pnpm run build

      - run: |
          sed -i 's/"name": "tokmon"/"name": "@davidilie\/tokmon"/' package.json
          npm publish || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
